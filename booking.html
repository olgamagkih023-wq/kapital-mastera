<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --em:#0D6E4A;--em3:#13C47E;--ink:#0C0D0A;
  --cream:#F9F5EE;--cream2:#F0E9DC;--border:#DDD4C4;
  --muted:#5A5750;--gold:#B8975A;--red:#C0392B;--white:#fff
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh}

/* Loading */
#loading{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;gap:16px;padding:24px
}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--em);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:.9rem;color:var(--muted);font-weight:300;text-align:center}
.retry-btn{margin-top:12px;padding:11px 24px;background:var(--em);color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;display:none}

/* Wrap */
.wrap{max-width:500px;margin:0 auto;display:none}
.wrap.ready{display:block}

/* Header */
.bk-header{background:var(--ink);padding:28px 24px;text-align:center}
.bk-logo{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:12px}
.master-av{width:56px;height:56px;border-radius:50%;background:var(--em);margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1.6rem;color:#fff;font-weight:500}
.master-name{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:400;color:#fff;margin-bottom:3px}
.master-prof{font-size:.78rem;color:rgba(255,255,255,.35);letter-spacing:.06em}
.closed-banner{background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.3);color:var(--red);padding:12px 16px;font-size:.88rem;font-weight:500;text-align:center}

/* Progress */
.progress{display:flex;gap:4px;padding:12px 24px 0;background:var(--ink)}
.prog-step{flex:1;height:3px;background:rgba(255,255,255,.12);border-radius:2px;transition:background .3s}
.prog-step.done{background:var(--em3)}

/* Steps */
.step{display:none;padding:20px 20px 40px}
.step.active{display:block}
.step-tag{font-size:.68rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;font-weight:600}
.step-title{font-family:'Cormorant Garamond',serif;font-size:1.45rem;font-weight:400;color:var(--ink);margin-bottom:18px}

/* Service cards */
.svc-list{display:flex;flex-direction:column;gap:8px}
.svc-card{padding:14px 16px;border:2px solid var(--border);background:var(--white);cursor:pointer;transition:all .18s;display:flex;justify-content:space-between;align-items:center;-webkit-tap-highlight-color:rgba(0,0,0,.05)}
.svc-card.sel,.svc-card:active{border-color:var(--em);background:rgba(13,110,74,.04)}
.svc-name{font-size:.95rem;font-weight:600;color:var(--ink);margin-bottom:3px}
.svc-dur{font-size:.78rem;color:var(--muted)}
.svc-price{font-size:.95rem;font-weight:700;color:var(--em);margin-left:12px;white-space:nowrap}

/* Calendar */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav-btn{width:34px;height:34px;background:none;border:1.5px solid var(--border);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:rgba(0,0,0,0)}
.cal-nav-btn:active{border-color:var(--em)}
.cal-month{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:400}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:14px}
.cal-wd{font-size:.6rem;font-weight:700;text-align:center;color:var(--muted);padding:4px 0;text-transform:uppercase}
.cal-day{height:38px;display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:500;cursor:pointer;border-radius:4px;transition:all .15s;-webkit-tap-highlight-color:rgba(0,0,0,.04)}
.cal-day.off{color:var(--border);cursor:default}
.cal-day.avail:hover{background:rgba(13,110,74,.1)}
.cal-day.today{border:2px solid var(--em);color:var(--em);font-weight:700}
.cal-day.sel{background:var(--em);color:#fff;border-radius:50%}

/* Time slots */
.time-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.time-slot{padding:12px 4px;text-align:center;border:1.5px solid var(--border);cursor:pointer;font-size:.88rem;font-weight:500;transition:all .15s;background:var(--white);-webkit-tap-highlight-color:rgba(0,0,0,.04)}
.time-slot.sel,.time-slot:active:not(.taken){background:var(--em);color:#fff;border-color:var(--em)}
.time-slot.taken{background:var(--cream2);color:var(--border);cursor:default;text-decoration:line-through}

/* Form */
.field{margin-bottom:14px}
.field label{display:block;font-size:.78rem;font-weight:600;color:var(--ink);margin-bottom:5px}
.field input,.field textarea{width:100%;padding:13px 14px;border:2px solid var(--border);background:var(--white);font-family:'DM Sans',sans-serif;font-size:.95rem;color:var(--ink);outline:none;transition:border-color .2s;-webkit-appearance:none;border-radius:0}
.field input:focus,.field textarea:focus{border-color:var(--em)}
.field textarea{resize:vertical;min-height:56px}

/* Summary */
.sum-box{background:var(--cream2);padding:14px 16px;margin-bottom:16px;border-left:3px solid var(--em)}
.sum-row{display:flex;justify-content:space-between;font-size:.88rem;padding:4px 0;border-bottom:1px solid rgba(0,0,0,.06)}
.sum-row:last-child{border:none;padding-top:8px;font-weight:700;font-size:.95rem;color:var(--em)}

/* Buttons */
.btn-next{width:100%;padding:15px;background:var(--em);color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;margin-top:8px;-webkit-tap-highlight-color:rgba(0,0,0,.1)}
.btn-next:active{background:var(--ink)}
.btn-next:disabled{background:var(--border);cursor:default}
.btn-back{width:100%;padding:13px;background:none;border:2px solid var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;margin-top:8px}
.err-msg{color:var(--red);font-size:.82rem;padding:10px 14px;background:rgba(192,57,43,.08);margin-bottom:10px;display:none;border-left:3px solid var(--red)}

/* Success */
.success{text-align:center;padding:36px 20px 48px}
.success-icon{font-size:3rem;display:block;margin-bottom:16px}
.success-title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:400;color:var(--ink);margin-bottom:8px}
.success-det{background:var(--cream2);padding:14px 16px;margin:16px 0;text-align:left;border-left:3px solid var(--em)}
.success-det-row{display:flex;justify-content:space-between;font-size:.88rem;padding:4px 0;border-bottom:1px solid rgba(0,0,0,.06)}
.success-det-row:last-child{border:none}
.success-sub{font-size:.85rem;color:var(--muted);line-height:1.7;margin-bottom:16px}
.msg-btns{display:flex;flex-direction:column;gap:10px;margin-top:4px}
.msg-btn{display:flex;align-items:center;justify-content:center;gap:10px;padding:14px;color:#fff;text-decoration:none;font-size:.9rem;font-weight:700;font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:rgba(0,0,0,.1)}
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Загружаем расписание...</div>
  <button class="retry-btn" id="retryBtn" onclick="location.reload()">↻ Обновить страницу</button>
</div>

<!-- Main content -->
<div class="wrap" id="mainWrap">
  <div class="bk-header">
    <div class="bk-logo">Капитал Мастера · Онлайн-запись</div>
    <div class="master-av" id="masterAv">М</div>
    <div class="master-name" id="masterName">Мастер</div>
    <div class="master-prof" id="masterProf"></div>
  </div>
  <div class="closed-banner" id="closedBanner" style="display:none">⏸ Запись временно закрыта</div>

  <div class="progress" id="progressBar">
    <div class="prog-step" id="p1"></div>
    <div class="prog-step" id="p2"></div>
    <div class="prog-step" id="p3"></div>
    <div class="prog-step" id="p4"></div>
  </div>

  <!-- STEP 1 -->
  <div class="step" id="s1">
    <div class="step-tag">Шаг 1 из 4</div>
    <div class="step-title">Выберите услугу</div>
    <div class="svc-list" id="svcList"></div>
  </div>

  <!-- STEP 2 -->
  <div class="step" id="s2">
    <div class="step-tag">Шаг 2 из 4</div>
    <div class="step-title">Выберите дату</div>
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="prevMonth()">←</button>
      <div class="cal-month" id="calMonthLbl"></div>
      <button class="cal-nav-btn" onclick="nextMonth()">→</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <button class="btn-back" onclick="goStep(1)">← Назад</button>
  </div>

  <!-- STEP 3 -->
  <div class="step" id="s3">
    <div class="step-tag">Шаг 3 из 4</div>
    <div class="step-title">Выберите время</div>
    <div style="font-size:.82rem;color:var(--muted);margin-bottom:14px" id="selDateLbl"></div>
    <div class="time-grid" id="timeGrid"></div>
    <button class="btn-back" onclick="goStep(2)">← Назад</button>
  </div>

  <!-- STEP 4 -->
  <div class="step" id="s4">
    <div class="step-tag">Шаг 4 из 4</div>
    <div class="step-title">Ваши данные</div>
    <div class="sum-box" id="sumBox"></div>
    <div class="err-msg" id="formErr"></div>
    <div class="field"><label>Ваше имя *</label><input type="text" id="cName" placeholder="Анна Иванова" autocomplete="name"></div>
    <div class="field"><label>Телефон *</label><input type="tel" id="cPhone" placeholder="+7 (999) 000-00-00" autocomplete="tel"></div>
    <div class="field"><label>Пожелания</label><textarea id="cNote" placeholder="Особые пожелания..."></textarea></div>
    <button class="btn-next" onclick="submitBooking()">Записаться ✓</button>
    <button class="btn-back" onclick="goStep(3)">← Назад</button>
  </div>

  <!-- SUCCESS -->
  <div class="step" id="sDone">
    <div class="success">
      <span class="success-icon">✅</span>
      <div class="success-title">Вы записаны!</div>
      <div class="success-det" id="successDet"></div>
      <div class="success-sub">Мастер получил уведомление. Вы также можете написать напрямую:</div>
      <div class="msg-btns" id="msgBtns"></div>
    </div>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────────
var S = {svc:null, date:null, time:null, cy:new Date().getFullYear(), cm:new Date().getMonth()};
var CFG = {
  isOpen:false, masterName:'Мастер', masterProf:'', masterPhone:'',
  masterTelegram:'', services:[], workDays:[1,2,3,4,5],
  workStart:'10:00', workEnd:'19:00'
};
var MASTER_UID = '';
var MONTHS    = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
var MONTHS_RU = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];

// ── Boot ─────────────────────────────────────────────────────
function boot(){
  var p = new URLSearchParams(window.location.search);

  if(p.get('status')){ showStatusPage(p.get('status')); return; }

  MASTER_UID = p.get('master') || '';

  if(!MASTER_UID){
    // Same device as master — read localStorage
    try{
      var raw = localStorage.getItem('km_booking_settings');
      if(raw){
        var parsed = JSON.parse(raw);
        CFG = Object.assign(CFG, parsed);
        showApp();
        return;
      }
    } catch(e){}
    showError('Ссылка недействительна.<br>Запросите актуальную ссылку у мастера.');
    return;
  }

  // Load from Firebase with 8s timeout
  var timedOut = false;
  var timer = setTimeout(function(){
    timedOut = true;
    // Try localStorage as fallback
    try{
      var raw = localStorage.getItem('km_booking_settings');
      if(raw){ CFG = Object.assign(CFG, JSON.parse(raw)); showApp(); return; }
    } catch(e){}
    showError('Не удалось загрузить расписание.<br>Проверьте соединение и <button onclick="location.reload()" style="color:var(--em);background:none;border:none;cursor:pointer;font-size:1em;font-weight:700">обновите страницу</button>.');
  }, 8000);

  if(!db){
    clearTimeout(timer);
    showError('Firebase недоступен.<br>Попробуйте позже.');
    return;
  }

  db.ref('masters/' + MASTER_UID + '/settings').once('value')
    .then(function(snap){
      if(timedOut) return;
      clearTimeout(timer);
      var data = snap.val();
      if(data) CFG = Object.assign(CFG, data);
      showApp();
    })
    .catch(function(e){
      if(timedOut) return;
      clearTimeout(timer);
      console.warn('Firebase error:', e);
      // Try localStorage fallback
      try{
        var raw = localStorage.getItem('km_booking_settings');
        if(raw){ CFG = Object.assign(CFG, JSON.parse(raw)); showApp(); return; }
      } catch(e2){}
      showError('Ошибка загрузки: ' + e.message + '<br><button onclick="location.reload()" style="color:var(--em);background:none;border:none;cursor:pointer;font-size:1em;font-weight:700">Попробовать снова</button>');
    });
}

function showApp(){
  document.getElementById('loading').style.display = 'none';
  document.getElementById('mainWrap').classList.add('ready');
  var av = document.getElementById('masterAv');
  var nm = document.getElementById('masterName');
  var pf = document.getElementById('masterProf');
  if(av) av.textContent = (CFG.masterName || 'М')[0].toUpperCase();
  if(nm) nm.textContent = CFG.masterName || 'Мастер';
  if(pf) pf.textContent = CFG.masterProf || '';
  if(!CFG.isOpen){
    document.getElementById('closedBanner').style.display = 'block';
    document.getElementById('progressBar').style.display = 'none';
    return;
  }
  if(!CFG.services || !CFG.services.length){
    document.getElementById('closedBanner').textContent = 'Мастер ещё не добавил услуги. Попробуйте позже.';
    document.getElementById('closedBanner').style.display = 'block';
    document.getElementById('progressBar').style.display = 'none';
    return;
  }
  goStep(1);
}

function showError(msg){
  document.getElementById('loading').style.display = 'flex';
  var spinner = document.querySelector('.spinner');
  if(spinner) spinner.style.display = 'none';
  var txt = document.getElementById('loadingText');
  if(txt){ txt.innerHTML = msg; txt.style.color = 'var(--red)'; }
  var retry = document.getElementById('retryBtn');
  if(retry) retry.style.display = 'block';
}

// ── Navigation ───────────────────────────────────────────────
function goStep(n){
  document.querySelectorAll('.step').forEach(function(s){ s.classList.remove('active'); });
  var target = n === 'done' ? 'sDone' : 's' + n;
  var el = document.getElementById(target);
  if(el) el.classList.add('active');
  var prog = n === 'done' ? 4 : n;
  for(var i=1;i<=4;i++){
    var d = document.getElementById('p'+i);
    if(d) d.className = 'prog-step' + (i <= prog ? ' done' : '');
  }
  if(n===1) renderServices();
  if(n===2) renderCalendar();
  if(n===3) renderTimes();
  if(n===4) renderSummary();
  window.scrollTo({top:0, behavior:'smooth'});
}

// ── Step 1: Services ─────────────────────────────────────────
function renderServices(){
  var el = document.getElementById('svcList');
  if(!el) return;
  el.innerHTML = '';
  (CFG.services || []).forEach(function(svc, i){
    var card = document.createElement('div');
    card.className = 'svc-card' + (S.svc && S.svc.id===svc.id ? ' sel' : '');
    card.innerHTML =
      '<div><div class="svc-name">' + svc.name + '</div><div class="svc-dur">⏱ ' + (svc.dur||60) + ' мин</div></div>' +
      '<div class="svc-price">' + Math.round(svc.price||0).toLocaleString('ru-RU') + ' ₽</div>';
    card.onclick = (function(s){ return function(){
      S.svc = s;
      document.querySelectorAll('.svc-card').forEach(function(c){ c.classList.remove('sel'); });
      this.classList.add('sel');
      setTimeout(function(){ goStep(2); }, 180);
    }; })(svc);
    el.appendChild(card);
  });
}

// ── Step 2: Calendar ─────────────────────────────────────────
function renderCalendar(){
  document.getElementById('calMonthLbl').textContent = MONTHS[S.cm] + ' ' + S.cy;
  var first = new Date(S.cy, S.cm, 1);
  var dow = first.getDay() || 7;
  var days = new Date(S.cy, S.cm+1, 0).getDate();
  var today = new Date(); today.setHours(0,0,0,0);
  var wds = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  var g = document.getElementById('calGrid');
  g.innerHTML = wds.map(function(d){ return '<div class="cal-wd">'+d+'</div>'; }).join('');
  for(var i=1;i<dow;i++) g.innerHTML += '<div></div>';
  for(var d=1;d<=days;d++){
    var dt = new Date(S.cy, S.cm, d);
    var wd = dt.getDay();
    var isPast = dt < today;
    var isOff  = (CFG.workDays || [1,2,3,4,5]).indexOf(wd) === -1;
    var dateStr = S.cy + '-' + pad(S.cm+1) + '-' + pad(d);
    var isToday = dt.getTime() === today.getTime();
    var isSel   = dateStr === S.date;
    var cls = 'cal-day';
    if(isPast || isOff) cls += ' off';
    else { cls += ' avail'; if(isToday) cls += ' today'; if(isSel) cls += ' sel'; }
    var div = document.createElement('div');
    div.className = cls;
    div.textContent = d;
    if(!isPast && !isOff){
      div.onclick = (function(ds){ return function(){ S.date=ds; goStep(3); }; })(dateStr);
    }
    g.appendChild(div);
  }
}
function prevMonth(){ if(S.cm===0){S.cm=11;S.cy--;}else S.cm--; renderCalendar(); }
function nextMonth(){ if(S.cm===11){S.cm=0;S.cy++;}else S.cm++; renderCalendar(); }
function pad(n){ return n<10?'0'+n:String(n); }

// ── Step 3: Time slots ───────────────────────────────────────
function renderTimes(){
  var parts = S.date ? S.date.split('-') : [];
  document.getElementById('selDateLbl').textContent = parts.length
    ? (+parts[2]) + ' ' + MONTHS_RU[+parts[1]-1] + ' ' + parts[0] : '';
  var sh = parseInt((CFG.workStart||'10:00').split(':')[0]) || 10;
  var eh = parseInt((CFG.workEnd  ||'19:00').split(':')[0]) || 19;
  var dur = S.svc ? (parseInt(S.svc.dur)||60) : 60;
  var step = dur <= 30 ? 30 : 60;
  var slots = [];
  for(var h=sh;h<eh;h++){
    slots.push(pad(h)+':00');
    if(step===30) slots.push(pad(h)+':30');
  }
  var g = document.getElementById('timeGrid');
  g.innerHTML = '<div style="color:var(--muted);font-size:.85rem;padding:8px 0">Загрузка...</div>';

  var getPromise = (db && MASTER_UID)
    ? db.ref('masters/'+MASTER_UID+'/appointments').orderByChild('date').equalTo(S.date).once('value')
        .then(function(snap){
          var taken = [];
          snap.forEach(function(c){ var a=c.val(); if(a.status!=='cancelled') taken.push(a.time); });
          return taken;
        })
        .catch(function(){ return []; })
    : Promise.resolve([]);

  getPromise.then(function(takenTimes){
    g.innerHTML = '';
    if(!slots.length){
      g.innerHTML = '<div style="color:var(--muted)">Нет доступного времени</div>';
      return;
    }
    slots.forEach(function(t){
      var taken = takenTimes.indexOf(t) > -1;
      var sel   = t === S.time;
      var div = document.createElement('div');
      div.className = 'time-slot' + (taken?' taken':'') + (sel?' sel':'');
      div.textContent = taken ? ('✕ '+t) : t;
      if(!taken){
        div.onclick = (function(tm){ return function(){
          S.time = tm;
          document.querySelectorAll('.time-slot').forEach(function(x){ x.classList.remove('sel'); });
          this.classList.add('sel');
          setTimeout(function(){ goStep(4); }, 180);
        }; })(t);
      }
      g.appendChild(div);
    });
  });
}

// ── Step 4: Summary ──────────────────────────────────────────
function renderSummary(){
  var p = S.date ? S.date.split('-') : [];
  var dateStr = p.length ? (+p[2])+'.'+p[1]+'.'+p[0] : '—';
  document.getElementById('sumBox').innerHTML =
    row('Услуга',     S.svc ? S.svc.name : '—') +
    row('Дата',       dateStr) +
    row('Время',      S.time || '—') +
    row('Стоимость',  S.svc ? Math.round(S.svc.price||0).toLocaleString('ru-RU')+' ₽' : '—');
}
function row(l,v){
  return '<div class="sum-row"><span style="color:var(--muted)">'+l+'</span><span style="font-weight:600">'+v+'</span></div>';
}

// ── Submit ───────────────────────────────────────────────────
function submitBooking(){
  var name  = (document.getElementById('cName').value||'').trim();
  var phone = (document.getElementById('cPhone').value||'').trim();
  var note  = (document.getElementById('cNote').value||'').trim();
  var err   = document.getElementById('formErr');
  err.style.display = 'none';
  if(!name)  { err.textContent='Введите ваше имя';     err.style.display='block'; return; }
  if(!phone) { err.textContent='Введите номер телефона'; err.style.display='block'; return; }

  var id = 'bk_' + Date.now() + '_' + Math.random().toString(36).substr(2,4);
  var appt = {
    id:id, client:name, phone:phone,
    service: S.svc ? S.svc.name : '',
    date:S.date, time:S.time,
    price: S.svc ? (S.svc.price||0) : 0,
    note:note, status:'pending', source:'online', created:Date.now()
  };

  // Save to Firebase
  if(db && MASTER_UID){
    db.ref('masters/'+MASTER_UID+'/appointments/'+id).set(appt)
      .then(function(){ sendTgNotify(appt); })
      .catch(function(e){ console.warn('Firebase save error:', e); });
  } else {
    // Fallback: localStorage
    try{
      var appts = JSON.parse(localStorage.getItem('km_appts')||'[]');
      appts.push(appt);
      localStorage.setItem('km_appts', JSON.stringify(appts));
    } catch(e){}
    sendTgNotify(appt);
  }
  showSuccess(appt);
}

// ── Telegram notify via proxy ────────────────────────────────
function sendTgNotify(a){
  var p = (a.date||'').split('-');
  var dateRu = p.length===3 ? (+p[2])+' '+MONTHS_RU[+p[1]-1] : (a.date||'');
  var nl = '\n';
  var text = [
    '\uD83D\uDD14 *\u041D\u043E\u0432\u0430\u044F \u0437\u0430\u043F\u0438\u0441\u044C \u043E\u043D\u043B\u0430\u0439\u043D!*', '',
    '\uD83D\uDC64 *' + a.client + '*',
    a.phone  ? '\uD83D\uDCDE ' + a.phone : null,
    '\uD83D\uDC86 ' + (a.service||'\u2014'),
    '\uD83D\uDCC5 ' + dateRu + '  \uD83D\uDD50 ' + (a.time||''),
    a.price  ? '\uD83D\uDCB0 ' + Math.round(a.price).toLocaleString('ru-RU') + ' \u20BD' : null,
    a.note   ? '\uD83D\uDCAC ' + a.note : null,
    '', '\u2705 \u041F\u043E\u0434\u0442\u0432\u0435\u0440\u0434\u0438\u0442\u0435 \u0432 \u043F\u0440\u0438\u043B\u043E\u0436\u0435\u043D\u0438\u0438'
  ].filter(function(x){ return x !== null; }).join(nl);

  fetch('/api/notify', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({text:text, parse_mode:'Markdown'})
  }).catch(function(){});
}

// ── Success screen ───────────────────────────────────────────
function showSuccess(a){
  var p = (a.date||'').split('-');
  var dateRu = p.length===3 ? (+p[2])+' '+MONTHS_RU[+p[1]-1]+' '+p[0] : (a.date||'');
  document.getElementById('successDet').innerHTML =
    srow('Имя',       a.client) +
    srow('Услуга',    a.service) +
    srow('Дата',      dateRu) +
    srow('Время',     a.time) +
    (a.price ? srow('Стоимость', Math.round(a.price).toLocaleString('ru-RU')+' \u20BD') : '');

  // Messenger buttons
  var btns = document.getElementById('msgBtns');
  btns.innerHTML = '';
  var phone = (CFG.masterPhone||'').replace(/\D/g,'');
  var tg    = (CFG.masterTelegram||'').trim().replace(/^@/,'');
  var nl2 = '%0A';
  var msgEnc = encodeURIComponent('\u0417\u0434\u0440\u0430\u0432\u0441\u0442\u0432\u0443\u0439\u0442\u0435! \u042F \u0437\u0430\u043F\u0438\u0441\u0430\u043B\u0430\u0441\u044C \u0447\u0435\u0440\u0435\u0437 \u0444\u043E\u0440\u043C\u0443.\n\u0418\u043C\u044F: '+a.client+'\n\u0423\u0441\u043B\u0443\u0433\u0430: '+a.service+'\n\u0414\u0430\u0442\u0430: '+dateRu+' \u0432 '+a.time);
  if(phone){
    var wa = phone.length===10 ? '7'+phone : phone;
    btns.appendChild(makeBtn('https://wa.me/'+wa+'?text='+msgEnc, '#25D366', waIcon(), ' WhatsApp'));
    btns.appendChild(makeBtn('https://vk.me/+'+wa, '#005BFF', msgIcon(), ' MAX / VK'));
  }
  if(tg){
    var tgUrl = /^\d+$/.test(tg) ? 'https://t.me/+'+tg : 'https://t.me/'+tg+'?text='+msgEnc;
    btns.appendChild(makeBtn(tgUrl, '#229ED9', tgIcon(), ' Telegram'));
  }
  if(!phone && !tg){
    btns.innerHTML = '<div style="font-size:.85rem;color:var(--muted);padding:12px 0">Мастер получил уведомление и свяжется с вами.</div>';
  }
  goStep('done');
}
function srow(l,v){ return '<div class="success-det-row"><span style="color:var(--muted)">'+l+'</span><span style="font-weight:600">'+v+'</span></div>'; }
function makeBtn(href, bg, icon, label){
  var a = document.createElement('a');
  a.href=href; a.target='_blank'; a.className='msg-btn'; a.style.background=bg;
  a.innerHTML=icon+label; return a;
}

// ── Status page ──────────────────────────────────────────────
function showStatusPage(apptId){
  document.getElementById('loading').style.display = 'none';
  document.getElementById('mainWrap').classList.add('ready');
  document.getElementById('progressBar').style.display = 'none';
  if(!db){ renderStatusUI(null); return; }
  db.ref('masters').once('value').then(function(snap){
    var found = null;
    snap.forEach(function(master){
      var a = master.child('appointments/'+apptId).val();
      if(a) found = a;
    });
    renderStatusUI(found, apptId);
  }).catch(function(){ renderStatusUI(null); });
}
function renderStatusUI(appt, apptId){
  var s1 = document.getElementById('s1');
  s1.classList.add('active');
  if(!appt){
    s1.innerHTML='<div style="padding:32px 20px;text-align:center"><div style="font-size:2rem;margin-bottom:12px">🔍</div><div style="font-weight:500">Запись не найдена</div></div>';
    return;
  }
  var colors={pending:'var(--gold)',confirmed:'var(--em)',cancelled:'var(--red)'};
  var labels={pending:'Ожидает подтверждения',confirmed:'✅ Подтверждена',cancelled:'❌ Отменена'};
  var p=(appt.date||'').split('-');
  var dateRu=p.length===3?(+p[2])+'.'+p[1]+'.'+p[0]:(appt.date||'');
  s1.innerHTML='<div style="padding:20px">'+
    '<div style="text-align:center;margin-bottom:20px">'+
      '<div style="display:inline-block;padding:8px 20px;background:'+(colors[appt.status]||'var(--muted)')+';color:#fff;font-size:.85rem;font-weight:700">'+(labels[appt.status]||appt.status)+'</div>'+
      '<div style="font-family:Cormorant Garamond,serif;font-size:1.5rem;margin-top:10px">Ваша запись</div>'+
    '</div>'+
    '<div style="background:var(--cream2);padding:14px 16px;border-left:3px solid '+(colors[appt.status]||'var(--muted)')+'">'+
      srow('Клиент',appt.client)+srow('Услуга',appt.service)+srow('Дата',dateRu)+srow('Время',appt.time)+
      (appt.price?srow('Стоимость',Math.round(appt.price).toLocaleString('ru-RU')+' ₽'):'')+'</div>'+
    (appt.status==='pending'?'<button onclick="cancelMyBooking(\''+apptId+'\')" style="width:100%;margin-top:14px;padding:13px;background:none;border:2px solid var(--border);color:var(--muted);font-family:DM Sans,sans-serif;font-size:.88rem;cursor:pointer">Отменить запись</button>':'')+
  '</div>';
}
function cancelMyBooking(id){
  if(!confirm('Отменить запись?')||!db) return;
  db.ref('masters').once('value').then(function(snap){
    snap.forEach(function(m){
      if(m.child('appointments/'+id).exists())
        db.ref('masters/'+m.key+'/appointments/'+id+'/status').set('cancelled');
    });
    setTimeout(function(){ location.reload(); }, 600);
  });
}

boot();
