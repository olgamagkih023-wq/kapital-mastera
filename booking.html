<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--em:#0D6E4A;--em3:#13C47E;--ink:#0C0D0A;--cream:#F9F5EE;--cream2:#F0E9DC;--border:#DDD4C4;--muted:#5A5750;--gold:#B8975A;--red:#C0392B;--white:#fff}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh}
.page-wrap{max-width:480px;margin:0 auto;padding:0 0 60px}

/* Header */
.book-header{background:var(--ink);padding:32px 24px 28px;text-align:center}
.book-logo{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:500;color:rgba(255,255,255,0.5);margin-bottom:16px}
.book-logo span{color:var(--em3)}
.master-name{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:400;color:#fff;margin-bottom:6px;line-height:1.1}
.master-prof{font-size:0.82rem;color:rgba(255,255,255,0.4);letter-spacing:0.08em}
.book-status-closed{background:rgba(192,57,43,0.15);border:1px solid rgba(192,57,43,0.3);color:var(--red);padding:10px 16px;font-size:0.85rem;font-weight:500;text-align:center;margin:16px 24px 0}

/* Steps */
.step{display:none;padding:24px}
.step.active{display:block}
.step-label{font-size:0.68rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold);margin-bottom:12px;font-weight:600}
.step-title{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:400;color:var(--ink);margin-bottom:20px}

/* Progress */
.progress{display:flex;gap:6px;padding:16px 24px 0}
.prog-dot{flex:1;height:3px;background:var(--border);border-radius:2px;transition:background 0.3s}
.prog-dot.done{background:var(--em)}

/* Service cards */
.svc-grid{display:flex;flex-direction:column;gap:8px}
.svc-card{padding:16px 18px;border:2px solid var(--border);background:var(--white);cursor:pointer;transition:all 0.2s;text-align:left}
.svc-card:hover,.svc-card.sel{border-color:var(--em);background:rgba(13,110,74,0.05)}
.svc-card.sel{border-width:2px}
.svc-n{font-size:1rem;font-weight:600;color:var(--ink);margin-bottom:4px}
.svc-meta{font-size:0.82rem;color:var(--muted)}
.svc-price{font-size:1rem;font-weight:700;color:var(--em)}

/* Date picker */
.date-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:16px}
.date-wd{font-size:0.6rem;font-weight:700;text-align:center;color:var(--muted);padding:4px 0;text-transform:uppercase}
.date-cell{height:40px;display:flex;align-items:center;justify-content:center;font-size:0.82rem;font-weight:500;border:1.5px solid transparent;cursor:pointer;border-radius:4px;transition:all 0.15s}
.date-cell.avail:hover,.date-cell.sel{background:var(--em);color:#fff;border-color:var(--em)}
.date-cell.today{border-color:var(--em);color:var(--em)}
.date-cell.off{color:var(--border);cursor:default}
.date-cell.past{color:var(--border);cursor:default}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-nav-btn{width:34px;height:34px;background:none;border:1.5px solid var(--border);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:border-color 0.2s}
.cal-nav-btn:hover{border-color:var(--em)}
.cal-month-lbl{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:400}

/* Time slots */
.time-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.time-slot{padding:12px 8px;text-align:center;border:1.5px solid var(--border);cursor:pointer;font-size:0.88rem;font-weight:500;transition:all 0.15s;background:var(--white)}
.time-slot:hover,.time-slot.sel{background:var(--em);color:#fff;border-color:var(--em)}
.time-slot.taken{background:var(--cream2);color:var(--border);cursor:default;text-decoration:line-through}

/* Form */
.field{margin-bottom:14px}
.field label{display:block;font-size:0.78rem;font-weight:600;color:var(--ink);margin-bottom:6px}
.field input,.field textarea{width:100%;padding:14px 16px;border:2px solid var(--border);background:var(--white);font-family:'DM Sans',sans-serif;font-size:0.95rem;color:var(--ink);outline:none;transition:border-color 0.2s}
.field input:focus,.field textarea:focus{border-color:var(--em)}
.field textarea{resize:vertical;min-height:60px}

/* Summary */
.summary-box{background:var(--cream2);padding:16px 18px;margin-bottom:20px}
.sum-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:0.88rem}
.sum-row:last-child{border-bottom:none;font-weight:700;font-size:1rem;color:var(--em);padding-top:10px}

/* Buttons */
.btn-next{width:100%;padding:16px;background:var(--em);color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;cursor:pointer;transition:background 0.2s;margin-top:8px}
.btn-next:hover{background:var(--ink)}
.btn-next:disabled{background:var(--border);cursor:default}
.btn-back{width:100%;padding:14px;background:none;border:2px solid var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;margin-top:8px;transition:border-color 0.2s}
.btn-back:hover{border-color:var(--ink)}

/* Success */
.success-box{text-align:center;padding:40px 24px}
.success-icon{font-size:3.5rem;margin-bottom:20px;display:block}
.success-title{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:400;color:var(--ink);margin-bottom:12px}
.success-sub{font-size:0.92rem;color:var(--muted);line-height:1.75;font-weight:300}
.success-details{background:var(--cream2);padding:16px 18px;margin:20px 0;text-align:left}
.err-msg{color:var(--red);font-size:0.82rem;padding:10px 14px;background:rgba(192,57,43,0.08);margin-bottom:10px;display:none}
</style>

</head>
<body>
<div class="page-wrap">

  <div class="book-header">
    <div class="book-logo">Капитал <span>Мастера</span></div>
    <div class="master-name" id="masterName">Мастер</div>
    <div class="master-prof" id="masterProf">Запись онлайн</div>
    <div id="closedBanner" class="book-status-closed" style="display:none">⏸ Запись временно закрыта</div>
  </div>

  <div class="progress">
    <div class="prog-dot done" id="p1"></div>
    <div class="prog-dot" id="p2"></div>
    <div class="prog-dot" id="p3"></div>
    <div class="prog-dot" id="p4"></div>
  </div>

  <!-- STEP 1: Выбор услуги -->
  <div class="step active" id="s1">
    <div class="step-label">Шаг 1 из 4</div>
    <div class="step-title">Выберите услугу</div>
    <div class="svc-grid" id="svcGrid"></div>
  </div>

  <!-- STEP 2: Выбор даты -->
  <div class="step" id="s2">
    <div class="step-label">Шаг 2 из 4</div>
    <div class="step-title">Выберите дату</div>
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="prevMonth()">←</button>
      <div class="cal-month-lbl" id="calLbl"></div>
      <button class="cal-nav-btn" onclick="nextMonth()">→</button>
    </div>
    <div class="date-grid" id="dateGrid"></div>
    <button class="btn-back" onclick="goStep(1)">← Назад</button>
  </div>

  <!-- STEP 3: Выбор времени -->
  <div class="step" id="s3">
    <div class="step-label">Шаг 3 из 4</div>
    <div class="step-title">Выберите время</div>
    <div style="font-size:0.85rem;color:var(--muted);margin-bottom:16px" id="selectedDateLabel"></div>
    <div class="time-grid" id="timeGrid"></div>
    <button class="btn-back" onclick="goStep(2)" style="margin-top:16px">← Назад</button>
  </div>

  <!-- STEP 4: Контактные данные -->
  <div class="step" id="s4">
    <div class="step-label">Шаг 4 из 4</div>
    <div class="step-title">Ваши данные</div>
    <div class="summary-box">
      <div class="sum-row"><span>Услуга</span><span id="sumSvc">—</span></div>
      <div class="sum-row"><span>Дата</span><span id="sumDate">—</span></div>
      <div class="sum-row"><span>Время</span><span id="sumTime">—</span></div>
      <div class="sum-row"><span>Стоимость</span><span id="sumPrice">—</span></div>
    </div>
    <div class="err-msg" id="formErr"></div>
    <div class="field"><label>Ваше имя *</label><input type="text" id="clientName" placeholder="Имя и фамилия"></div>
    <div class="field"><label>Телефон *</label><input type="tel" id="clientPhone" placeholder="+7 (___) ___-__-__"></div>
    <div class="field"><label>Комментарий</label><textarea id="clientNote" placeholder="Особые пожелания..."></textarea></div>
    <button class="btn-next" onclick="submitBooking()">Записаться ✓</button>
    <button class="btn-back" onclick="goStep(3)">← Назад</button>
  </div>

  <!-- SUCCESS -->
  <div class="step" id="sDone">
    <div class="success-box">
      <span class="success-icon">✅</span>
      <div class="success-title">Вы записаны!</div>
      <div class="success-details" id="successDetails"></div>
      <div class="success-sub">Мастер свяжется с вами для подтверждения.</div>
  <div id="messengerBtns" style="margin-top:20px;display:flex;flex-direction:column;gap:10px"></div>
    </div>
  </div>

</div>

<script>
var state = {svc:null, date:null, time:null, calYear:new Date().getFullYear(), calMonth:new Date().getMonth()};
var settings = {};

function loadSettings(){
  try{
    var raw = localStorage.getItem('km_booking_settings');
    if(raw) settings = JSON.parse(raw);
  }catch(e){}
  // Fallback defaults
  settings.masterName = settings.masterName || 'Мастер';
  settings.masterProf = settings.masterProf || 'Творческий специалист';
  settings.isOpen = settings.isOpen || false;
  settings.services = settings.services || [];
  settings.workDays = settings.workDays || [1,2,3,4,5];
  settings.workStart = settings.workStart || '10:00';
  settings.workEnd = settings.workEnd || '19:00';
  settings.masterPhone = settings.masterPhone || '';
}

function init(){
  loadSettings();
  document.getElementById('masterName').textContent = settings.masterName;
  document.getElementById('masterProf').textContent = settings.masterProf;
  // Pre-fill phone from URL param (for cross-device)
  var params = new URLSearchParams(window.location.search);
  if(params.get('phone')) settings.masterPhone = params.get('phone');
  if(!settings.isOpen){
    document.getElementById('closedBanner').style.display = 'block';
    document.getElementById('s1').innerHTML = '<div style="padding:40px 0;text-align:center;color:var(--muted)"><div style="font-size:2.5rem;margin-bottom:16px">⏸</div><div style="font-size:1rem">Запись временно закрыта.<br>Попробуйте позже.</div></div>';
    return;
  }
  renderServices();
}

function renderServices(){
  var g = document.getElementById('svcGrid');
  if(!settings.services.length){
    g.innerHTML = '<div style="color:var(--muted);font-size:0.9rem;padding:20px 0">Мастер ещё не добавил услуги</div>';
    return;
  }
  g.innerHTML = settings.services.map(function(s,i){
    return '<div class="svc-card" onclick="selectSvc('+i+')" data-idx="'+i+'"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div class="svc-n">'+s.name+'</div><div class="svc-meta">⏱ '+s.dur+' мин</div></div><div class="svc-price">'+Math.round(s.price).toLocaleString('ru-RU')+' ₽</div></div></div>';
  }).join('');
}

function selectSvc(idx){
  state.svc = settings.services[idx];
  document.querySelectorAll('.svc-card').forEach(function(c){c.classList.remove('sel')});
  document.querySelector('.svc-card[data-idx="'+idx+'"]').classList.add('sel');
  setTimeout(function(){goStep(2)},200);
}

// Calendar
var MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
function renderCal(){
  document.getElementById('calLbl').textContent = MONTHS[state.calMonth]+' '+state.calYear;
  var first = new Date(state.calYear, state.calMonth, 1);
  var startDow = first.getDay()||7;
  var days = new Date(state.calYear, state.calMonth+1, 0).getDate();
  var today = new Date(); today.setHours(0,0,0,0);
  var g = document.getElementById('dateGrid');
  var wds = ['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  var html = wds.map(function(d){return '<div class="date-wd">'+d+'</div>'}).join('');
  for(var i=1;i<startDow;i++) html+='<div></div>';
  for(var d=1;d<=days;d++){
    var dt = new Date(state.calYear,state.calMonth,d);
    var dow = dt.getDay();
    var isPast = dt < today;
    var isOff = settings.workDays.indexOf(dow)===-1;
    var dateStr = state.calYear+'-'+((state.calMonth+1).toString().padStart(2,'0'))+'-'+(d.toString().padStart(2,'0'));
    var cls = 'date-cell';
    var onclick = '';
    if(isPast||isOff){cls+=' off';} 
    else {
      var isToday = dt.getTime()===today.getTime();
      if(isToday) cls+=' today avail';
      else cls+=' avail';
      if(dateStr===state.date) cls+=' sel';
      onclick = ' onclick="selectDate(\''+dateStr+'\')"';
    }
    html+='<div class="'+cls+'"'+onclick+'>'+d+'</div>';
  }
  g.innerHTML=html;
}
function prevMonth(){if(state.calMonth===0){state.calMonth=11;state.calYear--;}else state.calMonth--;renderCal();}
function nextMonth(){if(state.calMonth===11){state.calMonth=0;state.calYear++;}else state.calMonth++;renderCal();}
function selectDate(d){
  state.date=d;
  document.querySelectorAll('.date-cell').forEach(function(c){c.classList.remove('sel')});
  var cells=document.querySelectorAll('.date-cell.avail');
  cells.forEach(function(c){if(c.onclick&&c.onclick.toString().includes(d))c.classList.add('sel')});
  setTimeout(function(){goStep(3)},200);
}

// Time slots
function renderTimes(){
  var start=parseInt(settings.workStart)||10;
  var end=parseInt(settings.workEnd)||19;
  var dur=state.svc?parseInt(state.svc.dur)||60:60;
  // Get existing appointments for this date
  var appts=[];
  try{appts=JSON.parse(localStorage.getItem('km_appts')||'[]');}catch(e){}
  var takenTimes=appts.filter(function(a){return a.date===state.date}).map(function(a){return a.time});
  var slots=[];
  for(var h=start;h<end;h++){
    slots.push((h<10?'0':'')+h+':00');
    if(dur<=30) slots.push((h<10?'0':'')+h+':30');
  }
  var parts=state.date?state.date.split('-'):[];
  var months2=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  document.getElementById('selectedDateLabel').textContent=parts.length?((+parts[2])+' '+months2[+parts[1]-1]+' '+parts[0]):'';
  document.getElementById('timeGrid').innerHTML=slots.map(function(t){
    var taken=takenTimes.indexOf(t)>-1;
    return '<div class="time-slot'+(taken?' taken':'')+(t===state.time?' sel':'')+'"'+(taken?'':' onclick="selectTime(\''+t+'\''+')"')+'>'+(taken?'<s>'+t+'</s>':t)+'</div>';
  }).join('');
}
function selectTime(t){
  state.time=t;
  document.querySelectorAll('.time-slot').forEach(function(c){c.classList.remove('sel')});
  event.target.classList.add('sel');
  setTimeout(function(){goStep(4)},200);
}

function goStep(n){
  document.querySelectorAll('.step').forEach(function(s){s.classList.remove('active')});
  document.getElementById('s'+n).classList.add('active');
  for(var i=1;i<=4;i++){
    var d=document.getElementById('p'+i);
    if(d)d.className='prog-dot'+(i<=n?' done':'');
  }
  if(n===2) renderCal();
  if(n===3) renderTimes();
  if(n===4) renderSummary();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderSummary(){
  document.getElementById('sumSvc').textContent=state.svc?state.svc.name:'—';
  var p=state.date?state.date.split('-'):[];
  document.getElementById('sumDate').textContent=p.length?(+p[2])+'.'+p[1]+'.'+p[0]:'—';
  document.getElementById('sumTime').textContent=state.time||'—';
  document.getElementById('sumPrice').textContent=state.svc?(Math.round(state.svc.price).toLocaleString('ru-RU')+' ₽'):'—';
}

function submitBooking(){
  var name=document.getElementById('clientName').value.trim();
  var phone=document.getElementById('clientPhone').value.trim();
  var note=document.getElementById('clientNote').value.trim();
  var err=document.getElementById('formErr');
  err.style.display='none';
  if(!name){err.textContent='Введите ваше имя';err.style.display='block';return;}
  if(!phone){err.textContent='Введите номер телефона';err.style.display='block';return;}
  // Save booking request to localStorage (master will see it)
  var appts=[];
  try{appts=JSON.parse(localStorage.getItem('km_appts')||'[]');}catch(e){}
  var id='bk_'+Date.now();
  appts.push({
    id:id, client:name, service:state.svc.name,
    date:state.date, time:state.time,
    price:state.svc.price, note:note,
    phone:phone, status:'pending',
    source:'online', created:Date.now()
  });
  // Save to Firebase (works across devices)
  var apptToSave = {
    id:id, client:name, service:state.svc ? state.svc.name : '',
    date:state.date, time:state.time,
    price:state.svc ? state.svc.price : 0,
    note:note, phone:phone, status:'pending',
    source:'online', created:Date.now()
  };
  db.ref('masters/' + masterUidGlobal + '/appointments/' + id).set(apptToSave)
    .then(function(){ console.log('Appointment saved to Firebase'); })
    .catch(function(e){ console.warn('Firebase error:', e); });
  // Build messenger message
  var masterPhone = (settings.masterPhone||'').replace(/\D/g,'');
  var msg = encodeURIComponent(
    'Здравствуйте! Я записалась к вам:\n'+
    'Имя: '+name+'\n'+
    'Услуга: '+state.svc.name+'\n'+
    'Дата: '+state.date+'\n'+
    'Время: '+state.time+'\n'+
    (note?'Комментарий: '+note+'\n':'')+
    'Жду подтверждения.'
  );
  if(masterPhone){
    var waBtn = document.getElementById('waBtn');
    var maxBtn = document.getElementById('maxBtn');
    if(waBtn) waBtn.href = 'https://wa.me/'+masterPhone+'?text='+msg;
    if(maxBtn) maxBtn.href = 'https://max.ru/chat/'+masterPhone+'?text='+msg;
    var messBtns = document.getElementById('messengerBtns');
    if(messBtns) messBtns.style.display='flex';
  }
  // Show success
  var statusUrl = window.location.origin + '/booking.html?status=' + id;
  _lastStatusUrl = statusUrl;
  document.querySelectorAll('.step').forEach(function(s){s.classList.remove('active')});
  document.getElementById('sDone').classList.add('active');
  var detailsHtml =
    '<div style="display:flex;flex-direction:column;gap:6px">'+
    '<div style="display:flex;justify-content:space-between;font-size:0.88rem;padding:5px 0;border-bottom:1px solid var(--border)"><span style="color:var(--muted)">Имя</span><span style="font-weight:500">'+name+'</span></div>'+
    '<div style="display:flex;justify-content:space-between;font-size:0.88rem;padding:5px 0;border-bottom:1px solid var(--border)"><span style="color:var(--muted)">Услуга</span><span style="font-weight:500">'+state.svc.name+'</span></div>'+
    '<div style="display:flex;justify-content:space-between;font-size:0.88rem;padding:5px 0;border-bottom:1px solid var(--border)"><span style="color:var(--muted)">Дата</span><span style="font-weight:500">'+state.date+'</span></div>'+
    '<div style="display:flex;justify-content:space-between;font-size:0.88rem;padding:5px 0;border-bottom:1px solid var(--border)"><span style="color:var(--muted)">Время</span><span style="font-weight:500">'+state.time+'</span></div>'+
    '<div style="display:flex;justify-content:space-between;font-size:0.88rem;padding:5px 0"><span style="color:var(--muted)">Стоимость</span><span style="font-weight:500;color:var(--em)">'+Math.round(state.svc.price).toLocaleString('ru-RU')+' ₽</span></div>'+
    '</div>'+
    '<div style="margin-top:14px;padding:12px 14px;background:rgba(13,110,74,0.07);border-left:3px solid var(--em)">'+
      '<div style="font-size:0.78rem;color:var(--muted);margin-bottom:6px">Ссылка на статус записи:</div>'+
      '<div style="font-size:0.82rem;color:var(--em);word-break:break-all;margin-bottom:8px">'+statusUrl+'</div>'+

// Status page mode
function checkStatusMode(){
  var params = new URLSearchParams(window.location.search);
  var statusId = params.get('status');
  if(!statusId) return false;
  // Show status of a specific booking
  var appts = [];
  try{appts = JSON.parse(localStorage.getItem('km_appts')||'[]');}catch(e){}
  var appt = appts.find(function(a){return a.id===statusId});
  // Hide all steps, show status panel
  document.querySelector('.progress').style.display='none';
  document.querySelectorAll('.step').forEach(function(s){s.classList.remove('active')});
  var statusColors = {pending:'#BA7517',confirmed:'#0D6E4A',cancelled:'#C0392B'};
  var statusLabels = {pending:'Ожидает подтверждения',confirmed:'Подтверждена ✓',cancelled:'Отменена'};
  if(!appt){
    document.getElementById('s1').innerHTML = '<div style="padding:32px 24px;text-align:center"><div style="font-size:2rem;margin-bottom:12px">🔍</div><div style="font-size:1rem;font-weight:500;color:var(--ink);margin-bottom:8px">Запись не найдена</div><div style="font-size:0.85rem;color:var(--muted)">Возможно запись была сделана с другого устройства</div></div>';
    document.getElementById('s1').classList.add('active');
    return true;
  }
  var color = statusColors[appt.status]||'#5A5750';
  var label = statusLabels[appt.status]||appt.status;
  document.getElementById('s1').innerHTML =
    '<div style="padding:20px">'+
    '<div style="text-align:center;margin-bottom:20px">'+
      '<div style="display:inline-block;padding:8px 20px;background:'+color+';color:#fff;font-size:0.82rem;font-weight:700;border-radius:20px;margin-bottom:8px">'+label+'</div>'+
      '<div style="font-size:1.6rem;font-family:Cormorant Garamond,serif;font-weight:400;color:var(--ink)">Ваша запись</div>'+
    '</div>'+
    '<div style="background:var(--cream2);padding:16px 18px;margin-bottom:16px">'+
      '<div style="display:flex;flex-direction:column;gap:8px">'+
      '<div style="display:flex;justify-content:space-between;font-size:0.88rem;padding:5px 0;border-bottom:1px solid var(--border)"><span style="color:var(--muted)">Имя</span><span style="font-weight:600">'+appt.client+'</span></div>'+
      '<div style="display:flex;justify-content:space-between;font-size:0.88rem;padding:5px 0;border-bottom:1px solid var(--border)"><span style="color:var(--muted)">Услуга</span><span style="font-weight:600">'+appt.service+'</span></div>'+
      '<div style="display:flex;justify-content:space-between;font-size:0.88rem;padding:5px 0;border-bottom:1px solid var(--border)"><span style="color:var(--muted)">Дата</span><span style="font-weight:600">'+appt.date+'</span></div>'+
      '<div style="display:flex;justify-content:space-between;font-size:0.88rem;padding:5px 0;border-bottom:1px solid var(--border)"><span style="color:var(--muted)">Время</span><span style="font-weight:600">'+appt.time+'</span></div>'+
      (appt.price?'<div style="display:flex;justify-content:space-between;font-size:0.88rem;padding:5px 0"><span style="color:var(--muted)">Стоимость</span><span style="font-weight:600;color:var(--em)">'+Math.round(appt.price).toLocaleString('ru-RU')+' ₽</span></div>':'')+ 
      '</div>'+
    '</div>'+
    (appt.status==='pending'?
      '<button data-aid="'+appt.id+'" onclick="cancelMyAppt(this.dataset.aid)" style="width:100%;padding:13px;background:none;border:2px solid var(--border);color:var(--muted);font-family:DM Sans,sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer">Отменить запись</button>'
    : '')+
    '</div>';
  document.getElementById('s1').classList.add('active');
  return true;
}

function cancelMyAppt(id){
  if(!confirm('Отменить запись?')) return;
  var appts = [];
  try{appts = JSON.parse(localStorage.getItem('km_appts')||'[]');}catch(e){}
  var a = appts.find(function(x){return x.id===id});
  if(a) a.status = 'cancelled';
  localStorage.setItem('km_appts', JSON.stringify(appts));
  checkStatusMode();
}

var _lastStatusUrl="";
function doCopyLink(){copyStatusLink(_lastStatusUrl)}
function copyStatusLink(url){
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(function(){
      var btn = event.target;
      btn.textContent = 'Скопировано ✓';
      setTimeout(function(){btn.textContent='Скопировать ссылку'},2000);
    });
  } else {
    var inp = document.createElement('input');
    inp.value = url;
    document.body.appendChild(inp);
    inp.select();
    document.execCommand('copy');
    document.body.removeChild(inp);
  }
}

// Don't call init() directly — loadSettings() calls it after Firebase responds
var p0 = new URLSearchParams(window.location.search);
if(p0.get('status')){
  checkStatusMode();
} else {
  loadSettings();  // async — calls init() when Firebase data arrives
}
